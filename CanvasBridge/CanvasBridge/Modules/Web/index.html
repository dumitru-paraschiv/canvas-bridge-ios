<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Bridge</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevent scrolling */
            background-color: #000;
            /* Default fallback background */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            /* Ensure the canvas is easily tappable */
            touch-action: none;
        }
    </style>
</head>

<body>
    <canvas id="appCanvas"></canvas>

    <script>
        const canvas = document.getElementById('appCanvas');
        const ctx = canvas.getContext('2d');

        // Canvas Setup and Crisp Rendering
        function resizeCanvas() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            // Account for Retina displays
            const dpr = window.devicePixelRatio || 1;

            // Set actual size in memory (scaled to account for extra pixel density)
            canvas.width = width * dpr;
            canvas.height = height * dpr;

            // Normalize coordinate system to use css pixels
            ctx.scale(dpr, dpr);

            // Set CSS size
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. JS -> Swift (Events)
        function sendMessageToSwift(event, payload) {
            try {
                // Envelope pattern
                const message = JSON.stringify({ event: event, payload: payload });

                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.canvasBridge) {
                    window.webkit.messageHandlers.canvasBridge.postMessage(message);
                } else {
                    console.log("Swift Bridge not available. Message:", message);
                }
            } catch (error) {
                console.error("Error sending message to Swift:", error);
            }
        }

        // 2. Lifecycle Event
        window.addEventListener('load', () => {
            sendMessageToSwift("lifecycle", { status: "ready" });
        });

        // 3. Interaction Event
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Calculate exact CSS coordinates relative to the canvas
            const tapX = e.clientX - rect.left;
            const tapY = e.clientY - rect.top;

            sendMessageToSwift("user_interaction", {
                type: "tap",
                node_id: "canvas_root", // Use node_id to match Swift WebModels CodingKeys
                x: tapX,
                y: tapY
            });
        });

        // Helper to draw a rounded rectangle
        function drawRoundedRect(x, y, w, h, r, color) {
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(x, y, w, h, r);
            } else {
                // Fallback for older WebKit versions
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.arcTo(x + w, y, x + w, y + r, r);
                ctx.lineTo(x + w, y + h - r);
                ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
                ctx.lineTo(x + r, y + h);
                ctx.arcTo(x, y + h, x, y + h - r, r);
                ctx.lineTo(x, y + r);
                ctx.arcTo(x, y, x + r, y, r);
            }
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        // 4. Swift -> JS (Commands)
        window.updateCanvasState = function (jsonString) {
            try {
                const data = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;

                if (data.action === "draw_shape") {
                    const p = data.payload;
                    const r = p.cornerRadius || 0;
                    drawRoundedRect(p.x, p.y, p.width, p.height, r, p.color);
                } else if (data.action === "clear_canvas") {
                    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                }
            } catch (error) {
                console.error("Error parsing JSON from Swift:", error);
            }
        };
    </script>
</body>

</html>
